# Example values file for harness-parser
# Use this as a starting point for your own values files.

name: my-service
namespace: default
replicaCount: 2

imagePullSecret: my-registry-secret

image:
  repository: my-org/my-service
  tag: "v1.2.3"
  pullPolicy: IfNotPresent

service:
  port: 8080

env:
  APP_ENV: production
  LOG_LEVEL: info

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

probes:
  liveness:
    path: "/health"
  readiness:
    path: "/ready"
